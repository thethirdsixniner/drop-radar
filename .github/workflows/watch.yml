name: Drop Radar - Check Stores

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: drop-radar-watcher
  cancel-in-progress: false

jobs:
  check-stores:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run watcher
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python watcher.py

      - name: Commit and push updated state
        run: |
          git config user.name "drop-radar-bot"
          git config user.email "actions@github.com"
          git add state.json
          git diff --cached --quiet && echo "No state changes" || git commit -m "Update state [skip ci]"

          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done